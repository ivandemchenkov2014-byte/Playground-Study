<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тесты 5–6 класс</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-light: #EAF3DE;
    --green-dark: #085041;
    --red-light: #FCEBEB;
    --red-dark: #501313;
    --red-mid: #A32D2D;
    --bg: #F7F6F1;
    --card: #FFFFFF;
    --text: #1a1a18;
    --muted: #6B6B65;
    --border: rgba(0,0,0,0.1);
  }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }

  .container {
    width: 100%;
    max-width: 720px;
  }

  header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .subject-tag {
    display: inline-block;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--green-dark);
    background: var(--green-light);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
  }

  .selection {
    display: block;
  }

  .select-block {
    margin-bottom: 1rem;
  }

  .select-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .class-grid,
  .difficulty-grid,
  .subject-grid {
    display: grid;
    gap: 10px;
  }

  .class-grid,
  .difficulty-grid {
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  }

  .subject-grid {
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  }

  .choice {
    min-height: 48px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #FAFAF8;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Manrope', sans-serif;
    color: var(--text);
    text-align: left;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  }

  .choice:hover {
    background: #F0EFE9;
    border-color: rgba(0,0,0,0.18);
  }

  .choice.active {
    background: var(--green-light);
    border-color: var(--green);
    box-shadow: 0 0 0 2px rgba(29,158,117,0.16);
  }

  .start-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-top: 1.25rem;
  }

  .selected-note {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.45;
  }

  .progress-row {
    display: none;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .progress-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-label,
  .timer-label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  .timer-label {
    color: var(--green-dark);
    background: var(--green-light);
    border: 1px solid #CFE9D3;
    border-radius: 20px;
    padding: 4px 10px;
  }

  .timer-label.warn {
    color: var(--red-dark);
    background: var(--red-light);
    border-color: #F7C1C1;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    margin-bottom: 1rem;
  }

  .q-number {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .q-text {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #FAFAF8;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Manrope', sans-serif;
    color: var(--text);
    text-align: left;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.45;
  }

  .opt:hover:not(:disabled) {
    background: #F0EFE9;
    border-color: rgba(0,0,0,0.18);
  }

  .opt .letter {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-top: 1px;
    transition: background 0.15s, color 0.15s;
  }

  .opt.correct { background: var(--green-light); border-color: var(--green); }
  .opt.correct .letter { background: var(--green); color: #fff; }
  .opt.wrong { background: var(--red-light); border-color: var(--red-mid); }
  .opt.wrong .letter { background: var(--red-mid); color: #fff; }
  .opt.reveal { background: var(--green-light); border-color: var(--green); }
  .opt.reveal .letter { background: var(--green); color: #fff; }

  .feedback-box {
    margin-top: 1rem;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.55;
    display: none;
  }

  .feedback-box.ok { background: var(--green-light); color: var(--green-dark); border: 1px solid #9FE1CB; }
  .feedback-box.err { background: var(--red-light); color: var(--red-dark); border: 1px solid #F7C1C1; }

  .actions {
    display: none;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 1rem;
  }

  .btn-next,
  .btn-restart,
  .btn-start,
  .btn-light {
    padding: 10px 22px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--text);
    color: #fff;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }

  .btn-next {
    display: none;
  }

  .btn-start:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .btn-light {
    background: #FAFAF8;
    color: var(--text);
  }

  .btn-next:hover,
  .btn-restart:hover,
  .btn-start:hover:not(:disabled),
  .btn-light:hover {
    opacity: 0.85;
  }

  .score-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 3rem 2rem;
    text-align: center;
    display: none;
  }

  .score-emoji { font-size: 48px; margin-bottom: 1rem; }
  .score-fraction { font-family: 'Unbounded', sans-serif; font-size: 52px; font-weight: 600; color: var(--text); line-height: 1; }
  .score-desc { font-size: 14px; color: var(--muted); margin-top: 8px; margin-bottom: 6px; }
  .score-grade { font-family: 'Unbounded', sans-serif; font-size: 18px; color: var(--green-dark); margin-bottom: 1rem; }
  .score-extra { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 2rem; }

  .score-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }

  .ai-callout {
    position: fixed;
    right: 100px;
    bottom: 118px;
    width: 230px;
    z-index: 15;
    pointer-events: none;
  }

  .ai-callout-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--green-dark);
    margin-bottom: 5px;
  }

  .ai-callout-text {
    font-size: 12px;
    line-height: 1.45;
    color: var(--muted);
  }

  .ai-arrow {
    width: 116px;
    height: 52px;
    margin-left: 96px;
    margin-top: 8px;
    border-right: 2px solid var(--green);
    border-bottom: 2px solid var(--green);
    border-radius: 0 0 18px 0;
    position: relative;
  }

  .ai-arrow::after {
    content: '';
    position: absolute;
    right: -6px;
    bottom: -3px;
    width: 10px;
    height: 10px;
    border-right: 2px solid var(--green);
    border-bottom: 2px solid var(--green);
    transform: rotate(-45deg);
  }

  .ai-launcher {
    position: fixed;
    right: 24px;
    bottom: 24px;
    width: 62px;
    height: 62px;
    border-radius: 50%;
    border: 1px solid rgba(8,80,65,0.18);
    background: var(--text);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 18px 40px rgba(0,0,0,0.22);
    z-index: 30;
    transition: transform 0.15s, opacity 0.15s;
  }

  .ai-launcher:hover {
    transform: translateY(-2px);
    opacity: 0.92;
  }

  .chat-icon {
    width: 28px;
    height: 22px;
    border: 2px solid #fff;
    border-radius: 10px;
    position: relative;
  }

  .chat-icon::after {
    content: '';
    position: absolute;
    right: 4px;
    bottom: -7px;
    width: 9px;
    height: 9px;
    background: var(--text);
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(38deg);
  }

  .chat-icon::before {
    content: '';
    position: absolute;
    left: 7px;
    top: 8px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 7px 0 0 #fff, 14px 0 0 #fff;
  }

  .ai-panel {
    position: fixed;
    right: 24px;
    bottom: 98px;
    width: min(390px, calc(100vw - 32px));
    max-height: min(640px, calc(100vh - 126px));
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.18);
    z-index: 29;
    overflow: hidden;
    display: none;
  }

  .ai-panel.open {
    display: flex;
    flex-direction: column;
  }

  .ai-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 15px 16px;
    border-bottom: 1px solid var(--border);
    background: #FAFAF8;
  }

  .ai-kicker {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 4px;
  }

  .ai-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .ai-close {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
  }

  .ai-messages {
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .ai-msg {
    max-width: 92%;
    border-radius: 14px;
    padding: 11px 13px;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-line;
  }

  .ai-msg.bot {
    align-self: flex-start;
    background: var(--green-light);
    color: var(--green-dark);
    border: 1px solid #CFE9D3;
  }

  .ai-msg.user {
    align-self: flex-end;
    background: var(--text);
    color: #fff;
  }

  .ai-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 16px 16px;
  }

  .ai-option {
    padding: 9px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #FAFAF8;
    color: var(--text);
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    transition: background 0.15s, border-color 0.15s;
  }

  .ai-option:hover {
    background: #F0EFE9;
    border-color: rgba(0,0,0,0.18);
  }

  .ai-input-row {
    display: none;
    gap: 8px;
    padding: 12px 16px 16px;
    border-top: 1px solid var(--border);
    background: #FAFAF8;
  }

  .ai-input-row.open {
    display: flex;
  }

  .ai-input {
    flex: 1;
    min-width: 0;
    border-radius: 10px;
    border: 1px solid var(--border);
    padding: 10px 12px;
    font: inherit;
    font-size: 13px;
    background: #fff;
  }

  .ai-send {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--text);
    color: #fff;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
  }

  @media (max-width: 560px) {
    body { padding-top: 1rem; }
    .card { padding: 1.25rem; }
    .start-panel { align-items: stretch; flex-direction: column; }
    .btn-start { width: 100%; }
    .progress-row { align-items: stretch; flex-wrap: wrap; }
    .progress-track { flex-basis: 100%; order: 3; }
    .ai-callout { display: none; }
    .ai-panel {
      right: 12px;
      bottom: 86px;
      width: calc(100vw - 24px);
      max-height: calc(100vh - 104px);
    }
    .ai-launcher {
      right: 16px;
      bottom: 16px;
      width: 56px;
      height: 56px;
    }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="subject-tag" id="page-tag">5 класс · тренажёр</div>
    <h1 id="page-title">Итоговые тесты</h1>
    <p class="subtitle" id="page-subtitle">Выбери класс и предмет · 16 вопросов · 45 минут</p>
  </header>

  <section class="selection" id="selection">
    <div class="card">
      <div class="select-block">
        <div class="select-title">Класс</div>
        <div class="class-grid" id="class-grid">
          <button class="choice active" data-grade="5">5 класс</button>
          <button class="choice" data-grade="6">6 класс</button>
        </div>
      </div>

      <div class="select-block">
        <div class="select-title">Предмет</div>
        <div class="subject-grid" id="subject-grid"></div>
      </div>

      <div class="select-block">
        <div class="select-title">Уровень подготовки</div>
        <div class="difficulty-grid" id="difficulty-grid">
          <button class="choice active" data-difficulty="basic">Начальная подготовка</button>
          <button class="choice" data-difficulty="middle">Средняя подготовка</button>
          <button class="choice" data-difficulty="general">Генеральная подготовка</button>
        </div>
      </div>

      <div class="start-panel">
        <div class="selected-note" id="selected-note">Сначала выбери предмет.</div>
        <button class="btn-start" id="startbtn" onclick="startTest()" disabled>Начать тест</button>
      </div>
    </div>
  </section>

  <div class="progress-row" id="progress-row">
    <div class="timer-label" id="timer">45:00</div>
    <div class="progress-track"><div class="progress-fill" id="prog"></div></div>
    <div class="progress-label" id="prog-label">0 / 16</div>
  </div>

  <div class="card" id="qcard" style="display: none;">
    <div class="q-number" id="qnum"></div>
    <div class="q-text" id="qtext"></div>
    <div class="options" id="opts"></div>
    <div class="feedback-box" id="feedback"></div>
  </div>

  <div class="actions" id="actions">
    <button class="btn-light" onclick="backToSelection()">К выбору</button>
    <button class="btn-next" id="nextbtn" onclick="nextQ()">Следующий →</button>
  </div>

  <div class="score-card" id="scorebox"></div>
</div>

<aside class="ai-callout" aria-hidden="true">
  <div class="ai-callout-title">ИИ Playground</div>
  <div class="ai-callout-text">Поможет собрать план подготовки под класс, предмет и цель.</div>
  <div class="ai-arrow"></div>
</aside>

<button class="ai-launcher" id="ai-launcher" onclick="toggleAI()" aria-label="Открыть чат Playground AI">
  <span class="chat-icon" aria-hidden="true"></span>
</button>

<section class="ai-panel" id="ai-panel" aria-label="Playground AI">
  <div class="ai-head">
    <div>
      <div class="ai-kicker">Playground AI</div>
      <div class="ai-title">План обучения</div>
    </div>
    <button class="ai-close" onclick="toggleAI(false)" aria-label="Закрыть чат">×</button>
  </div>
  <div class="ai-messages" id="ai-messages"></div>
  <div class="ai-options" id="ai-options"></div>
  <div class="ai-input-row" id="ai-input-row">
    <input class="ai-input" id="ai-input" type="text" placeholder="Напиши, что сейчас сложнее всего">
    <button class="ai-send" onclick="sendAIText()">Отправить</button>
  </div>
</section>

<script>
const QUESTION_COUNT = 16;
const TEST_SECONDS = 45 * 60;
const LAST_TEST_PREFIX = 'school-tests-last-variant-';
const letters = ['А','Б','В','Г'];
const languageSubjectIds = ['russian', 'english', 'german', 'french'];
const REQUIRED_GRAMMAR_COUNT = 5;

const difficultyLevels = {
  basic: { name: 'Начальная подготовка', shortName: 'начальная', count: 10, pool: ['basic'] },
  middle: { name: 'Средняя подготовка', shortName: 'средняя', count: 16, pool: ['basic', 'middle'] },
  general: { name: 'Генеральная подготовка', shortName: 'генеральная', count: 24, pool: ['middle', 'general'] }
};

const subjects = {
  geography: { name: 'География' },
  history: { name: 'История' },
  biology: { name: 'Биология' },
  informatics: { name: 'Информатика' },
  math: { name: 'Математика' },
  english: { name: 'Английский' },
  german: { name: 'Немецкий' },
  french: { name: 'Французский' },
  russian: { name: 'Русский' },
  literature: { name: 'Литература' }
};

function makeBank(rows) {
  return rows.map(([q, correct, wrong1, wrong2, wrong3, exp, category]) => ({
    q: String(q),
    opts: [correct, wrong1, wrong2, wrong3].map(String),
    ans: 0,
    exp: String(exp),
    category: category || 'general'
  }));
}

const questionBanks = {
  geography: [
    { q: "Модель Земли, на которой показаны материки, океаны и линии градусной сети, называется", opts: ["глобус", "компас", "атлас", "барометр"], ans: 0, exp: "Глобус — уменьшенная объёмная модель Земли, на которой сохраняется форма планеты." },
    { q: "Линия, которая делит Землю на Северное и Южное полушария, называется", opts: ["экватор", "меридиан", "тропик", "полярный круг"], ans: 0, exp: "Экватор проходит на равном расстоянии от полюсов и делит Землю на два полушария." },
    { q: "Условное изображение земной поверхности на плоскости — это", opts: ["географическая карта", "телескоп", "почвенный профиль", "барометр"], ans: 0, exp: "Географическая карта показывает земную поверхность с помощью условных знаков и масштаба." },
    { q: "Число или запись, показывающая, во сколько раз расстояния на карте меньше настоящих, называется", opts: ["масштаб", "легенда", "параллель", "координата"], ans: 0, exp: "Масштаб помогает перевести расстояние на карте в расстояние на местности." },
    { q: "Прибор для определения сторон горизонта называется", opts: ["компас", "термометр", "линейка", "нивелир"], ans: 0, exp: "Компас показывает направление на север, а по нему определяют остальные стороны горизонта." },

function addRows(grade, subject, rows) {
  if (!questionBanksByGrade[grade][subject]) questionBanksByGrade[grade][subject] = [];
  questionBanksByGrade[grade][subject].push(...makeBank(rows));
}

function pickFrom(items, index, field) {
  const picked = [];
  for (let offset = 1; picked.length < 3 && offset < items.length + 4; offset++) {
    const value = items[(index + offset) % items.length][field];
    if (value !== items[index][field] && !picked.includes(value)) picked.push(value);
  }
  return picked;
}

function addTermRows(grade, subject, items) {
  const rows = [];
  items.forEach(([term, meaning], index) => {
    rows.push([
      'Что означает термин «' + term + '»?',
      meaning,
      ...pickFrom(items, index, 1),
      term + ' — ' + meaning + '.'
    ]);
    rows.push([
      'Как называется понятие: ' + meaning + '?',
      term,
      ...pickFrom(items, index, 0),
      'Это ' + term + '.'
    ]);
  });
  addRows(grade, subject, rows);
}

function addVocabularyRows(grade, subject, label, items) {
  const rows = [];
  items.forEach(([foreign, russian], index) => {
    rows.push([
      'Как переводится «' + foreign + '»?',
      russian,
      ...pickFrom(items, index, 1),
      '«' + foreign + '» означает «' + russian + '».'
    ]);
    rows.push([
      'Как ' + label + ' будет «' + russian + '»?',
      foreign,
      ...pickFrom(items, index, 0),
      '«' + russian + '» — это «' + foreign + '».'
    ]);
  });
  addRows(grade, subject, rows);
}

function addMathRow(rows, q, answer, wrongs, exp) {
  const correct = String(answer);
  const uniqueWrongs = [];
  wrongs.map(String).forEach(wrong => {
    if (wrong !== correct && !uniqueWrongs.includes(wrong)) uniqueWrongs.push(wrong);
  });
  let shift = 1;
  while (uniqueWrongs.length < 3) {
    const fallback = String(Number(answer) + shift);
    if (fallback !== correct && !uniqueWrongs.includes(fallback)) uniqueWrongs.push(fallback);
    shift++;
  }
  rows.push([q, correct, uniqueWrongs[0], uniqueWrongs[1], uniqueWrongs[2], exp]);
}

function assignDifficultyLevels() {
  Object.values(questionBanksByGrade).forEach(subjectBanks => {
    Object.values(subjectBanks).forEach(bank => {
      const oneThird = Math.ceil(bank.length / 3);
      bank.forEach((question, index) => {
        question.level = index < oneThird ? 'basic' : index < oneThird * 2 ? 'middle' : 'general';
      });
    });
  });
}

function spreadGrammarDifficultyLevels() {
  Object.values(questionBanksByGrade).forEach(subjectBanks => {
    languageSubjectIds.forEach(subject => {
      const grammarQuestions = (subjectBanks[subject] || []).filter(question => question.category === 'grammar');
      grammarQuestions.forEach((question, index) => {
        question.level = index % 2 === 0 ? 'basic' : 'general';
      });
    });
  });
}

  });
  addRows('5', 'math', buildMath5Rows());

  addLanguagePracticeRows();
  addRequiredGrammarRows();
  markExistingLanguageGrammarRows();
  assignDifficultyLevels();
  spreadGrammarDifficultyLevels();
}

function demoQuestion(q, correct, wrongs, exp, category) {
  const opts = [String(correct)];
  wrongs.map(String).forEach(option => {
    if (option !== opts[0] && !opts.includes(option) && opts.length < 4) opts.push(option);
  });
  while (opts.length < 4) opts.push('нет верного ответа ' + opts.length);
  return { q: String(q), opts, ans: 0, exp: String(exp), category: category || 'demo', level: 'middle' };
}

function demoPick(items, index) {
  return items[((index % items.length) + items.length) % items.length];
}

function demoWrongOptions(correct, options) {
  return options.filter(option => option !== correct).slice(0, 3);
}

function demoOrderAnswer(items, sortedItems) {
  return sortedItems.map(item => String(items.indexOf(item) + 1)).join('');
}

function finalizeDemoVariant(subject, variant, index) {
  const uniqueQuestions = makeDemoVariantUniqueQuestions(subject, index);
  if (!languageSubjectIds.includes(subject)) {
    return [...uniqueQuestions, ...variant];
  }

  const grammar = variant.filter(question => question.category === 'grammar').slice(0, REQUIRED_GRAMMAR_COUNT);
  const rest = variant.filter(question => question.category !== 'grammar');
  return [...grammar, ...uniqueQuestions, ...rest];
}

  demoVariantSubjectIds5.forEach(subject => {

function chooseDemoVariantIndex(storageKey, variants) {
  const usedKey = storageKey + '-demo-used';
  const lastKey = storageKey + '-demo-last';
  const lastIndex = Number(sessionStorage.getItem(lastKey));
  let used = [];
  try {
    used = JSON.parse(sessionStorage.getItem(usedKey) || '[]').filter(index => Number.isInteger(index) && index >= 0 && index < variants.length);
  } catch (error) {
    used = [];
  }

  let available = variants.map((_, index) => index).filter(index => !used.includes(index) && index !== lastIndex);
  if (!available.length) {
    used = Number.isInteger(lastIndex) ? [lastIndex] : [];
    available = variants.map((_, index) => index).filter(index => index !== lastIndex);
  }

  const pickedIndex = demoPick(shuffle(available), 0);
  used.push(pickedIndex);
  sessionStorage.setItem(usedKey, JSON.stringify(used.slice(-variants.length)));
  sessionStorage.setItem(lastKey, String(pickedIndex));
  return pickedIndex;
}

function pickDemoQuestionsForDifficulty(variant, subjectId, count) {
  if (!languageSubjectIds.includes(subjectId)) {
    return variant.slice(0, count);
  }

  const grammar = variant.filter(question => question.category === 'grammar').slice(0, Math.min(REQUIRED_GRAMMAR_COUNT, count));
  const rest = variant.filter(question => question.category !== 'grammar').slice(0, count - grammar.length);
  return [...grammar, ...rest];
}

function pickDemoStyleVariant(subjectId) {
  const variants = demoVariantBanksByGrade[selectedGrade] && demoVariantBanksByGrade[selectedGrade][subjectId];
  if (!variants) return null;
  const difficulty = difficultyLevels[selectedDifficulty];
  const storageKey = LAST_TEST_PREFIX + selectedGrade + '-' + subjectId + '-' + selectedDifficulty;
  const variantIndex = chooseDemoVariantIndex(storageKey, variants);
  return pickDemoQuestionsForDifficulty(variants[variantIndex], subjectId, difficulty.count);
}

function shuffle(items) {
  const mixed = [...items];
  for (let i = mixed.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [mixed[i], mixed[j]] = [mixed[j], mixed[i]];
  }
  return mixed;
}

function normalizeQuestion(item) {
  const optionObjects = item.opts.map((text, index) => ({
    text,
    correct: index === item.ans
  }));
  const shuffledOptions = shuffle(optionObjects);
  return {
    q: item.q,
    opts: shuffledOptions.map(option => option.text),
    ans: shuffledOptions.findIndex(option => option.correct),
    exp: item.exp
  };
}

function pickQuestionsForVariant(pool, bank, subjectId, count) {
  if (!languageSubjectIds.includes(subjectId)) {
    return shuffle(pool).slice(0, count);
  }

  const grammarPool = pool.filter(question => question.category === 'grammar');
  const allGrammar = bank.filter(question => question.category === 'grammar');
  const grammarSource = grammarPool.length >= REQUIRED_GRAMMAR_COUNT ? grammarPool : allGrammar;
  const grammarPicked = shuffle(grammarSource).slice(0, Math.min(REQUIRED_GRAMMAR_COUNT, count));
  const pickedSet = new Set(grammarPicked);
  const restCount = count - grammarPicked.length;
  const preferredRest = pool.filter(question => !pickedSet.has(question) && question.category !== 'grammar');
  const fallbackRest = bank.filter(question => !pickedSet.has(question) && question.category !== 'grammar');
  const restSource = preferredRest.length >= restCount ? preferredRest : fallbackRest;

  return shuffle([
    ...grammarPicked,
    ...shuffle(restSource).slice(0, restCount)
  ]);
}

function buildVariant(subjectId) {
  const demoPicked = pickDemoStyleVariant(subjectId);
  if (demoPicked) {
    questions = demoPicked.map(normalizeQuestion);
    return;
  }

  const bank = questionBanksByGrade[selectedGrade][subjectId];
  const difficulty = difficultyLevels[selectedDifficulty];
  const preferredPool = bank.filter(question => difficulty.pool.includes(question.level));
  const pool = preferredPool.length >= difficulty.count ? preferredPool : bank;
  const storageKey = LAST_TEST_PREFIX + selectedGrade + '-' + subjectId + '-' + selectedDifficulty;
  const lastSignature = sessionStorage.getItem(storageKey);
  let picked = [];
  let signature = '';

  for (let attempt = 0; attempt < 30; attempt++) {
    picked = pickQuestionsForVariant(pool, bank, subjectId, difficulty.count);
    signature = picked.map(item => item.q).sort().join('|');
    if (signature !== lastSignature) break;
  }

  sessionStorage.setItem(storageKey, signature);
  questions = picked.map(normalizeQuestion);
}

function formatTime(totalSeconds) {
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
}

function updateTimer() {
  const timer = document.getElementById('timer');
  timer.textContent = formatTime(secondsLeft);
  timer.classList.toggle('warn', secondsLeft <= 60);
}

function startTimer() {
  stopTimer();
  secondsLeft = TEST_SECONDS;
  updateTimer();
  timerId = setInterval(() => {
    secondsLeft--;
    updateTimer();
    if (secondsLeft <= 0) {
      finishedByTimer = true;
      stopTimer();
      showScore();
    }
  }, 1000);
}

function stopTimer() {
  if (timerId) clearInterval(timerId);
  timerId = null;
}

function startTest() {
  if (!selectedSubject) return;
  cur = 0;
  score = 0;
  answered = false;
  finishedByTimer = false;
  buildVariant(selectedSubject);
  updateHeader('test');
  document.getElementById('selection').style.display = 'none';
  document.getElementById('scorebox').style.display = 'none';
  document.getElementById('progress-row').style.display = 'flex';
  document.getElementById('qcard').style.display = 'block';
  document.getElementById('actions').style.display = 'flex';
  startTimer();
  render();
}

function render() {
  if (cur >= questions.length) { showScore(); return; }
  const q = questions[cur];
  const pct = cur / questions.length * 100;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = cur + ' / ' + questions.length;
  document.getElementById('qnum').textContent = 'Вопрос ' + (cur + 1);
  document.getElementById('qtext').textContent = q.q;

  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  q.opts.forEach((option, index) => {
    const button = document.createElement('button');
    button.className = 'opt';
    button.innerHTML = '<span class="letter">' + letters[index] + '</span><span>' + option + '</span>';
    button.onclick = () => answer(index);
    opts.appendChild(button);
  });

  const fb = document.getElementById('feedback');
  fb.style.display = 'none';
  fb.className = 'feedback-box';
  document.getElementById('nextbtn').style.display = 'none';
  answered = false;
}

function answer(index) {
  if (answered || finishedByTimer) return;
  answered = true;
  const q = questions[cur];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(button => button.disabled = true);
  buttons[index].classList.add(index === q.ans ? 'correct' : 'wrong');
  if (index !== q.ans) buttons[q.ans].classList.add('reveal');
  if (index === q.ans) score++;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback-box ' + (index === q.ans ? 'ok' : 'err');
  fb.textContent = (index === q.ans ? '✓ Верно! ' : '✗ Неверно. ') + q.exp;
  fb.style.display = 'block';

  const nextButton = document.getElementById('nextbtn');
  nextButton.style.display = 'inline-block';
  nextButton.textContent = cur < questions.length - 1 ? 'Следующий →' : 'Результат →';
}

function nextQ() {
  cur++;
  render();
}

  stopTimer();
  updateHeader('score');

  document.getElementById('prog-label').textContent = questions.length + ' / ' + questions.length;
  document.getElementById('qcard').style.display = 'none';
  document.getElementById('actions').style.display = 'none';
  document.getElementById('selection').style.display = 'none';
  document.getElementById('progress-row').style.display = 'none';

  const pct = Math.round(score / questions.length * 100);
  const grade = pct >= 85 ? '5' : pct >= 65 ? '4' : pct >= 45 ? '3' : '2';
  const emoji = pct >= 85 ? '🌿' : pct >= 65 ? '🌱' : pct >= 45 ? '🍂' : '🌾';
  const timeText = finishedByTimer
    ? 'Время вышло. Засчитаны ответы, которые были даны до конца таймера.'

  `;
}

function getExamSchedule() {
  if (aiPlan.examTime === 'week') {
    return 'Срок короткий: каждый день повторяй 1–2 темы, сразу решай тест и разбирай ошибки. Последний день оставь только на слабые места.';
  }
  if (aiPlan.examTime === 'weeks') {
    return 'Есть 2–3 недели: первую часть времени отдай теории, вторую — вариантам тестов и ошибкам. Повторяй сложные темы через день.';
  }
  if (aiPlan.examTime === 'month') {
    return 'Есть месяц: можно идти спокойно. Неделя 1 — база, неделя 2 — сложные темы, неделя 3 — тесты, неделя 4 — повторение ошибок.';
  }
  if (aiPlan.examTime === 'long') {
    return 'Времени много: начни с начальной подготовки, потом перейди на среднюю, а за 2 недели до экзамена включи генеральную подготовку.';
  }
  if (aiPlan.examTime === 'custom') {
    return 'Ты указал срок: ' + aiPlan.customExamTime + '. Разбей подготовку на три шага: сначала база, затем задания по слабым темам, в конце полный тест и разбор ошибок.';
  }
  return 'Сначала повтори базу, потом решай варианты и отдельно выписывай ошибки.';
}

function buildAIPlanText() {
  const subjectName = subjects[aiPlan.subject].name;
  const data = studyTopics[aiPlan.grade][aiPlan.subject][aiPlan.goal];
  const topicLines = data.map((topic, index) => (index + 1) + '. ' + topic).join('\n');

  if (aiPlan.goal === 'exam') {
    return 'План для экзамена: ' + aiPlan.grade + ' класс · ' + subjectName + '.\n\nНадо повторить:\n' + topicLines + '\n\nСрок: ' + getExamSchedule() + '\n\nКак идти:\n1. Повтори теорию и выпиши определения.\n2. Решай задания по каждой теме.\n3. Пройди тест на сайте на средней подготовке.\n4. Перед экзаменом включи генеральную подготовку и разбери ошибки.';
  }

  return 'План для проверки знаний: ' + aiPlan.grade + ' класс · ' + subjectName + '.\n\nГлавное, что надо знать:\n' + topicLines + '\n\nКак проверить себя:\n1. Быстро прочитай конспект или параграф.\n2. Объясни каждую тему своими словами.\n3. Пройди тест и посмотри пояснения к ошибкам.\n4. Через день повтори вопросы, где было сложнее всего.';
}

}

function buildCasualReply(text) {
  const t = text.toLowerCase();

  if (/(учеб|учить|школ|экзам|контроль|тест|предмет|план|готов)/.test(t)) {
    return 'Можем и про учёбу, конечно. Но только если ты сам хочешь. Для плана нажми «Создать план», а если хочется просто выдохнуть и поболтать — я тоже здесь.';
  }

  if (/(привет|здравств|хай|hello|hi)/.test(t)) {
    return 'Привет. Рад тебя видеть. Какой у тебя сейчас режим: поболтать спокойно, придумать что-то интересное или просто немного отвлечься?';
  }

  if (/(как дела|как ты|что делаешь)/.test(t)) {
    return 'У меня всё ровно: сижу тут в уголке сайта и жду, когда меня позовут. А у тебя как день проходит?';
  }

  if (/(игр|майн|roblox|роблокс|minecraft|гейм)/.test(t)) {
    return 'Про игры можно. Мне нравятся идеи, где есть выбор и развитие: база, прокачка, секретные уровни, испытания на время. Если бы ты делал свою игру, она была бы больше про приключение, строительство или соревнование?';
  }

  if (/(фильм|сериал|мульт|аниме|кино)/.test(t)) {
    return 'Для кино-настроения я бы выбирал по ощущению: если хочется энергии — приключение, если хочется уюта — комедия, если хочется подумать — фантастика или детектив. Какой жанр тебе сейчас ближе?';
  }

  if (/(музык|песн|трек|плейлист)/.test(t)) {
    return 'Музыка сильно меняет состояние. Можно собрать плейлист под режим: “собраться”, “отдохнуть”, “идти куда-то”, “ночная концентрация”. Какое настроение у плейлиста?';
  }

  if (/(скуч|нечего|заняться)/.test(t)) {
    return 'Можно устроить маленький челлендж: за 3 минуты придумать название для игры, героя и одну необычную механику. Или можно выбрать фильм, музыку, прогулку, мини-проект, рисунок, заметку в дневник. Я бы начал с идеи, которая не требует подготовки.';
  }

  if (/(груст|плохо|устал|устала|бесит|злюсь|тревож)/.test(t)) {
    return 'Понимаю. Тогда без давления. Иногда лучшее действие — сделать паузу, выпить воды, убрать лишний шум и назвать вслух, что именно давит. Можешь написать одним предложением, что случилось, я просто побуду рядом и помогу разложить это спокойнее.';
  }

  if (/(рад|класс|круто|ура|получилось|супер)/.test(t)) {
    return 'Вот это приятно. Такие моменты надо фиксировать, а не пролетать мимо. Что именно получилось или порадовало?';
  }

  if (/(шутк|смешн|рассмеши)/.test(t)) {
    return 'Мини-шутка: мой план на день был “быть полезным”, но потом я открыл список задач и понял, что это уже полноценная карьера.';
  }

  if (/(иде|придум|твор|проект)/.test(t)) {
    return 'Идея: сделай “капсулу настроения” — маленькую страницу или заметку, где есть цвет дня, короткая фраза, музыка, цель и один скрин/рисунок. Через месяц получится личная коллекция дней.';
  }

  if (/(кто ты|ты кто|playground ai|ии)/.test(t)) {
    return 'Я Playground AI внутри сайта: могу помогать с планом обучения, но могу и просто поговорить. В этой версии я не настоящий большой онлайн-ИИ, а локальный помощник с заготовленной логикой, зато он быстрый и всегда под рукой.';
  }

  if (/(спасибо|пасиб)/.test(t)) {
    return 'Пожалуйста. Мне нравится быть полезным, но ещё больше нравится, когда здесь становится удобнее и живее.';
  }

  return 'Понял. Давай так: расскажи чуть подробнее, а я подхвачу. Можно про настроение, идеи, игры, кино, музыку, планы, мечты или вообще случайную мысль. Я не буду сводить всё к учёбе, обещаю.';
}
